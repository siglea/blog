<footer class="site-footer">
  <div class="footer-grid">
    <div class="footer-section">
      <h4>关于</h4>
      <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
        {{ site.description }}
      </p>
      <p style="font-size: 13px; margin-top: 10px;">
        ■ 文章：<a href="{{ site.baseurl }}/archive">{{ site.posts | size }}</a>
      </p>
      {% if site.github_username %}
      <p style="font-size: 13px;">
        <a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>
      </p>
      {% endif %}
    </div>

    <div class="footer-section">
      <h4>最新文章</h4>
      <ul class="recent-posts">
        {% for post in site.posts limit:6 %}
        <li>
          <span class="post-separator">■</span>
          <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>

  <div class="footer-bottom">
    <p>© {{ site.time | date: '%Y' }} {{ site.author }} | <a href="{{ site.baseurl }}/feed.xml">订阅Feed</a></p>
  </div>
</footer>

<style>
  .site-footer {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    padding: var(--spacing-2xl) 0;
    margin-top: var(--spacing-2xl);
  }

  .footer-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 var(--spacing-xl);
  }

  .footer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: var(--spacing-2xl);
    margin-bottom: var(--spacing-2xl);
  }

  .footer-section {
    .footer-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer-subtitle {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      color: var(--text-primary);
    }

    .footer-description {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: var(--spacing-lg);
    }

    .footer-author {
      p {
        margin: var(--spacing-xs) 0;
        color: var(--text-muted);
        font-size: 0.875rem;
      }
    }
  }

  .footer-links {
    list-style: none;
    padding: 0;
    margin: 0;

    li {
      margin-bottom: var(--spacing-sm);

      a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color var(--transition-fast);

        &:hover {
          color: var(--primary-color);
        }
      }
    }
  }

  .social-links {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);

    a {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);

      &:hover {
        color: var(--primary-color);
      }

      i {
        font-size: 1.25rem;
        width: 20px;
      }
    }
  }

  .recent-posts {
    list-style: none;
    padding: 0;
    margin: 0;

    li {
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--border-color);

      &:last-child {
        border-bottom: none;
      }

      a {
        color: var(--text-secondary);
        text-decoration: none;
        display: block;
        font-weight: 500;
        margin-bottom: var(--spacing-xs);
        transition: color var(--transition-fast);

        &:hover {
          color: var(--primary-color);
        }
      }

      small {
        color: var(--text-muted);
        font-size: 0.75rem;
      }
    }
  }

  .footer-bottom {
    border-top: 1px solid var(--border-color);
    padding-top: var(--spacing-xl);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--spacing-md);

    p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin: 0;

      a {
        color: var(--primary-color);
        text-decoration: none;

        &:hover {
          text-decoration: underline;
        }
      }
    }

    .theme-toggle-footer {
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        padding: var(--spacing-xs) var(--spacing-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-size: 0.875rem;

        &:hover {
          background: var(--primary-color);
          color: white;
          border-color: var(--primary-color);
        }
      }
    }
  }

  @media (max-width: 768px) {
    .footer-grid {
      grid-template-columns: 1fr;
      gap: var(--spacing-xl);
    }

    .footer-bottom {
      flex-direction: column;
      text-align: center;
      gap: var(--spacing-lg);
    }
  }
</style>

<script>
  // Footer theme toggle
  document.getElementById('theme-toggle-footer')?.addEventListener('click', function() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);

    const icon = this.querySelector('i');
    icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  });
</script>
